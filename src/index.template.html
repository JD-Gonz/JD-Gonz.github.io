<!DOCTYPE HTML>
<html>

<head>
  <title><!--@@META_TITLE@@--></title>
  <meta charset="utf-8" />
<!--@@META_OG@@-->
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="./public/css/main.css" />
  <noscript>
    <link rel="stylesheet" href="./public/css/noscript.css" />
  </noscript>
</head>

<body class="homepage is-preload">
  <div id="page-wrapper">

    <!-- Header -->
    <div id="header">

      <!-- Inner -->
      <div class="inner">
        <header>
          <h1 id="logo"><!--@@HEADER_LOGO@@--></h1>
          <hr />
          <p><!--@@HEADER_TAGLINE@@--></p>
        </header>
        <footer>
          <a href="#main" class="button circled scrolly">Explore</a>
        </footer>
      </div>

      <!-- Nav -->
      <nav id="nav">
        <ul>
          <li><a href="#main">About Me</a></li>
          <li><a href="#banner">Projects</a></li>
          <li><a href="#footer">Contact Me</a></li>
        </ul>
      </nav>
    </div>

    <!-- About Me -->
    <div class="wrapper style2">
      <article id="main" class="container special">
        <img class="image centered" src="<!--@@ABOUT_IMAGE_SRC@@-->" alt="<!--@@ABOUT_IMAGE_ALT@@-->" />
        <header>
          <h2><!--@@ABOUT_HEADING@@--></h2>
          <p><!--@@ABOUT_LEDE@@--></p>
        </header>
        <p><!--@@ABOUT_BODY@@--></p>
      </article>
    </div>

    <!-- personal highlights -->
    <div class="wrapper style1">
      <section id="features" class="container special">
        <header>
          <h2><!--@@HIGHLIGHTS_HEADING@@--></h2>
          <p><!--@@HIGHLIGHTS_INTRO@@--></p>
        </header>
        <div class="row">
<!--@@HIGHLIGHTS@@-->
        </div>
      </section>
    </div>

    <!-- portfolio highlights -->
    <section id="banner">
      <header>
        <h2><strong><!--@@BANNER_HEADING@@--></strong></h2>
        <p><!--@@BANNER_BODY@@--></p>
      </header>
    </section>

    <!-- Carousel -->
    <section class="carousel">
      <div class="reel">

<!--@@PROJECTS@@-->

      </div>
    </section>

    <!-- Footer -->
    <div id="footer">
      <div class="container">
        <div class="row">
          <div class="col-12">
            <!-- Contact -->
            <section class="contact">
              <header>
                <h2><!--@@CONTACT_HEADING@@--></h2>
              </header>
              <ul class="icons">
<!--@@CONTACT_LINKS@@-->
              </ul>
              <h3><a href="<!--@@CONTACT_RESUME_HREF@@-->" download><!--@@CONTACT_RESUME_LABEL@@--></a></h3>
            </section>

            <!-- Copyright -->
            <div class="copyright">
              <ul class="menu">
<!--@@COPYRIGHT_ITEMS@@-->
              </ul>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Scripts -->
    <script src="./public/js/jquery.min.js"></script>
    <script src="./public/js/jquery.dropotron.min.js"></script>
    <script src="./public/js/jquery.scrolly.min.js"></script>
    <script src="./public/js/jquery.scrollex.min.js"></script>
    <script src="./public/js/browser.min.js"></script>
    <script src="./public/js/breakpoints.min.js"></script>
    <script src="./public/js/util.js"></script>
    <script src="./public/js/main.js"></script>
</body>

</html>
