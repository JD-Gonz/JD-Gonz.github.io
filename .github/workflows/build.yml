# .github/workflows/build.yml
# On every push to master, re-render index.html from src/index.template.html
# + data/*.json and commit the result back. GitHub Pages then serves the
# updated static file. The [skip ci] marker on the auto-commit prevents this
# workflow from recursively triggering itself.
name: Build and publish index.html

on:
  push:
    branches: [master]
    paths:
      # Only the inputs to the render pipeline trigger a rebuild. A commit
      # that only touches the generated index.html (e.g. our own [skip ci]
      # commit below) should not start another run.
      - "src/index.template.html"
      - "data/**"
      - "lib/**"
      - "scripts/build.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build.yml"

  # Allow manual rebuilds from the Actions tab.
  workflow_dispatch:

# Needed so the workflow can push the rebuilt index.html back to master.
permissions:
  contents: write

concurrency:
  # Never let two builds race on the same branch.
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 lets us push back cleanly, and also gives git
          # enough history to diff against.
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          NODE_ENV: test
        run: npm test

      - name: Build static index.html
        env:
          NODE_ENV: production
        run: npm run build

      - name: Commit regenerated index.html if it changed
        run: |
          set -euo pipefail
          if git diff --quiet -- index.html; then
            echo "index.html unchanged — nothing to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html
          git commit -m "chore: rebuild index.html [skip ci]

          Auto-generated from src/index.template.html + data/*.json
          by .github/workflows/build.yml on commit ${GITHUB_SHA::7}."
          git push origin HEAD:${GITHUB_REF_NAME}
